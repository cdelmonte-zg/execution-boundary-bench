apiVersion: v1
kind: Pod
metadata:
  name: bench-hardened
  labels:
    app: bench
    runtime: hardened
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: Localhost
      localhostProfile: profiles/bench-seccomp.json
  containers:
    - name: workload
      image: python:3.11-slim
      imagePullPolicy: IfNotPresent
      command: ["python3", "/app/server.py"]
      ports:
        - containerPort: 8080
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 100m
          memory: 128Mi
      readinessProbe:
        httpGet:
          path: /ready
          port: 8080
        initialDelaySeconds: 1
        periodSeconds: 2
        timeoutSeconds: 5
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      volumeMounts:
        - name: workload-code
          mountPath: /app
  volumes:
    - name: workload-code
      configMap:
        name: bench-workload
  restartPolicy: Never
